<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Handwritten Digit Recognition</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<h1 class="text-center fw-bold">
🤖 AI Handwritten Digit Recognition
</h1>

<p class="text-center text-muted mb-4">
Draw any digit from <b>0-9</b> and let the CNN model predict it.
</p>

<hr>

<div class="row">

<!-- Canvas -->

<div class="col-md-6 text-center">

<h4 class="mb-3">
✍ Draw Here
</h4>

<canvas
id="canvas"
width="320"
height="320">
</canvas>

<div class="mt-4">

<button
class="btn btn-danger me-2"
onclick="clearCanvas()">

🗑 Clear

</button>

<button
class="btn btn-primary"
onclick="predictDigit()">

🔍 Predict

</button>

</div>

</div>

<!-- Prediction -->

<div class="col-md-6">

<div class="card border-0 shadow-sm">

<div class="card-body">

<h4 class="text-center">
Prediction Result
</h4>

<hr>

<div id="loading" class="text-center text-primary fw-bold">

Analyzing...

</div>

<h2 class="display-1 text-center text-primary mt-3" id="digit">

-

</h2>

<h5 class="text-center">

Confidence

</h5>

<div class="progress mt-3" style="height:30px;">

<div
id="confidenceBar"
class="progress-bar progress-bar-striped progress-bar-animated bg-success">

0%

</div>

</div>

</div>

</div>

<div class="card mt-4 border-0 shadow-sm">

<div class="card-body">

<h5>

🥇 Top Predictions

</h5>

<div id="top3">

Waiting...

</div>

</div>

</div>

</div>

</div>

<hr class="my-5">

<div class="row text-center">

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h2>🧠</h2>

<h6>CNN Model</h6>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h2>📊</h2>

<h6>99.28% Accuracy</h6>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h2>📚</h2>

<h6>MNIST Dataset</h6>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h2>⚡</h2>

<h6>TensorFlow</h6>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
